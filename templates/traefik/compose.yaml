services:
  traefik:
    image: traefik:v3.3
    container_name: kernet-traefik
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TZ=${TZ}
      # Nécessaire pour la substitution dans traefik.yml (certificatsResolvers.acme.email)
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /opt/traefik/dynamic:/etc/traefik/dynamic:ro
      - /opt/traefik/data:/data
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - com.centurylinklabs.watchtower.enable=true

      # Middleware BasicAuth — défini ici (labels Docker) car le file provider
      # ne fait PAS de substitution de variables d'environnement.
      # Génère le hash : htpasswd -nbB admin 'motdepasse'
      - traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_BASIC_AUTH}

      # Dashboard (protégé par BasicAuth + security headers)
      - traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DASHBOARD_HOST}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls=true
      - traefik.http.routers.traefik.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.middlewares=traefik-auth@docker,security-headers@file

networks:
  proxy:
    external: true
