services:
  matomo-db:
    image: postgres:16
    container_name: matomo-db
    restart: unless-stopped
    labels:
      # DB exclue de Watchtower : un redémarrage inopiné coupe matomo-app
      - com.centurylinklabs.watchtower.enable=false
    environment:
      - POSTGRES_DB=${MATOMO_DB_NAME}
      - POSTGRES_USER=${MATOMO_DB_USER}
      - POSTGRES_PASSWORD=${MATOMO_DB_PASSWORD}
      - TZ=${TZ}
    volumes:
      - /opt/matomo/db:/var/lib/postgresql/data
    networks:
      - matomo_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MATOMO_DB_USER} -d ${MATOMO_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  matomo-app:
    image: matomo:5-fpm
    container_name: matomo-app
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    depends_on:
      matomo-db:
        condition: service_healthy
    environment:
      - MATOMO_DATABASE_HOST=matomo-db
      - MATOMO_DATABASE_ADAPTER=pgsql
      - MATOMO_DATABASE_TABLES_PREFIX=matomo_
      - MATOMO_DATABASE_USERNAME=${MATOMO_DB_USER}
      - MATOMO_DATABASE_PASSWORD=${MATOMO_DB_PASSWORD}
      - MATOMO_DATABASE_DBNAME=${MATOMO_DB_NAME}
      - TZ=${TZ}
    volumes:
      - /opt/matomo/data:/var/www/html
    networks:
      - matomo_internal

  matomo-nginx:
    image: nginx:1.27-alpine
    container_name: matomo-nginx
    restart: unless-stopped
    depends_on:
      - matomo-app
    volumes:
      - /opt/matomo/data:/var/www/html:ro
      - /opt/matomo/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy
      - matomo_internal
    labels:
      # Watchtower + Traefik dans un seul bloc labels (deux blocs = le 2e écrase le 1er en YAML)
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.matomo.rule=Host(`${MATOMO_HOST}`)
      - traefik.http.routers.matomo.entrypoints=websecure
      - traefik.http.routers.matomo.tls=true
      - traefik.http.routers.matomo.tls.certresolver=letsencrypt
      - traefik.http.routers.matomo.middlewares=security-headers@file,rate-limit-public@file
      - traefik.http.services.matomo.loadbalancer.server.port=80

networks:
  proxy:
    external: true
  matomo_internal:
    name: matomo_internal
    internal: true
