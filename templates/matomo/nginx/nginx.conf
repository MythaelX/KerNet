upstream matomo_fpm {
    server matomo-app:9000;
}

server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php;

    # Sécurité : pas de version nginx visible
    server_tokens off;

    # Fichiers statiques servis directement
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ ^/index\.php$ {
        fastcgi_pass matomo_fpm;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_read_timeout 240;
    }

    # Bloque l'accès aux fichiers sensibles Matomo
    location ~ /vendor/ {
        deny all;
        return 403;
    }

    location ~ /node_modules/ {
        deny all;
        return 403;
    }

    location ~ /config/ {
        deny all;
        return 403;
    }

    location ~ /core/|/tmp/ {
        deny all;
        return 403;
    }

    # Bloque les fichiers PHP sauf index.php
    location ~ \.php$ {
        deny all;
        return 403;
    }
}
